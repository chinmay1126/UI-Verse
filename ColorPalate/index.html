<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">

    <meta http-equiv="Content-Security-Policy"
        content="default-src 'self' https:;
        base-uri 'self';
        frame-ancestors 'none';
        object-src 'none';
        connect-src 'self' https:;
        img-src 'self' data: https:;
        font-src 'self' data: https:;
        script-src 'self' https: 'unsafe-hashes';
        script-src-attr 'unsafe-hashes';
        style-src 'self' https: 'unsafe-hashes';
        style-src-attr 'unsafe-hashes'">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Color Palette Generator</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <main class="container">

        <!-- Header -->

        <header class="header">

            <h1>🎨 Color Palette Generator</h1>

            <p class="subtitle">
                Generate beautiful color palettes instantly for your next project.
            </p>

        </header>

        <!-- Command/Search Bar -->

        <section class="command-section">

            <label for="commandInput" class="visually-hidden">
                Command Palette
            </label>

            <input
                id="commandInput"
                class="command-input"
                type="text"
                placeholder="Search colors or type a command..."
                autocomplete="off"
                spellcheck="false">

        </section>

        <!-- Toolbar -->

        <section class="toolbar">

            <button
                id="generateBtn"
                class="primary-btn"
                type="button">

                🎲 Generate Palette

            </button>

            <button
                id="copyAllBtn"
                class="secondary-btn"
                type="button">

                📋 Copy All

            </button>

        </section>

        <!-- Keyboard Hint -->

        <section class="shortcut-card">

            <span>⌨️ Shortcuts</span>

            <div class="shortcut-list">

                <kbd>Space</kbd>

                <span>Generate</span>

                <kbd>Ctrl</kbd>

                +

                <kbd>G</kbd>

                <span>Generate</span>

            </div>

        </section>

        <!-- Palette -->

        <section
            id="palette"
            class="palette"
            role="list"
            aria-label="Generated Color Palette">

            <!-- Dynamic Color Cards -->

        </section>

        <!-- Empty State -->

        <section
            id="emptyState"
            class="empty-state">

            <div class="emoji">🌈</div>

            <h2>No Palette Yet</h2>

            <p>
                Click <strong>Generate Palette</strong> to create a random
                collection of beautiful colors.
            </p>

        </section>

        <!-- Footer -->

        <footer class="footer">

            <p>
                Built for designers, developers, and creative projects.
            </p>

        </footer>

    </main>

    <script src="app.js"></script>

</body>

</html>
