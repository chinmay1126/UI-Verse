<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="stylesheet" href="dist/shared.css">
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self' https:; base-uri 'self'; frame-ancestors 'none'; object-src 'none'; connect-src 'self' https:; img-src 'self' data: https:; font-src 'self' data: https:; script-src 'self' https: 'unsafe-hashes' 'sha256-XhHALSQxrtuDWD4kMQXjdbWQ6BmjxTx0/3GY2VRLL8M='; script-src-attr 'unsafe-hashes' 'sha256-XhHALSQxrtuDWD4kMQXjdbWQ6BmjxTx0/3GY2VRLL8M='; style-src 'self' https: 'unsafe-hashes'; style-src-attr 'unsafe-hashes'">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Smart Search & Filter Demo — UIverse</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <link rel="stylesheet" href="smart-search-demo.css" />
</head>
<body>
  <a class="skip-link" href="#main-content">Skip to main content</a>
  <div class="container">
    <div class="header">
      <h1>🔍 Smart Search & Filter</h1>
      <p>Advanced component discovery system</p>
    </div>
    <div class="demo-section">
      <div class="section-title"><i class="fas fa-search"></i> Live Search</div>
      <input type="search" id="search-input" placeholder="Search components (e.g., button, form)..." />
      <div id="suggestions" class="suggestions"></div>
    </div>
    <div class="demo-section">
      <div class="section-title"><i class="fas fa-sliders-h"></i> Advanced Filters</div>
      <div class="filter-group">
        <div class="filter-title">Categories</div>
        <div class="filter-options" id="category-filters"></div>
      </div>
      <div class="filter-group">
        <div class="filter-title">Tags</div>
        <div class="filter-options" id="tag-filters"></div>
      </div>
      <button class="reset-btn" onclick="resetFilters()">Reset Filters</button>
    </div>
    <div class="demo-section">
      <div class="section-title"><i class="fas fa-list"></i> Results</div>
      <div id="results"></div>
    </div>
  </div>
  <script src="js/features/smart-search.js"></script>
  <script src="js/features/filter-manager.js"></script>
  <script src="dist/shared.js"></script>
</body>
</html>
