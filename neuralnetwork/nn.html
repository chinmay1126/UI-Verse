<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self' https:; base-uri 'self'; frame-ancestors 'none'; object-src 'none'; connect-src 'self' https:; img-src 'self' data: https:; font-src 'self' data: https:; script-src 'self' https: 'unsafe-hashes'; script-src-attr 'unsafe-hashes'; style-src 'self' https: 'unsafe-hashes'; style-src-attr 'unsafe-hashes'"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Neural Network Visualizer</title>
    <link rel="stylesheet" href="nn.css" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css"
    />
  </head>
  <body>
    <header>
      <h1><i class="ti ti-brain"></i> Neural Network Visualizer</h1>
    </header>

    <div class="nn-root">
      <!-- Metric cards -->
      <div class="metrics">
        <div class="metric">
          <div class="metric-label">Epoch</div>
          <div class="metric-value accent" id="mEpoch">0</div>
        </div>
        <div class="metric">
          <div class="metric-label">Accuracy</div>
          <div class="metric-value green" id="mAcc">0.00%</div>
        </div>
        <div class="metric">
          <div class="metric-label">Loss</div>
          <div class="metric-value red" id="mLoss">2.300</div>
        </div>
        <div class="metric">
          <div class="metric-label">Learning rate</div>
          <div class="metric-value" id="mLR">0.010</div>
        </div>
      </div>

      <!-- Network + Training side by side -->
      <div class="nn-grid">
        <!-- Network -->
        <div class="card">
          <div class="col-header">
            <div>
              <div class="section-title">Neural layers</div>
              <div class="sub">3 layers · 9 neurons</div>
            </div>
            <div class="status-row" style="margin: 0">
              <div class="status-dot"></div>
              <span class="status-text">Live</span>
            </div>
          </div>
          <div class="network-area">
            <canvas id="networkCanvas" height="210"></canvas>
          </div>
        </div>

        <!-- Training progress -->
        <div class="card">
          <div class="section-title" style="margin-bottom: 16px">
            Training progress
          </div>

          <div style="margin-bottom: 16px">
            <div class="col-header">
              <span class="sub">Epoch progress</span>
              <span class="sub" id="epochPct">0%</span>
            </div>
            <div class="prog-track">
              <div class="prog-fill" id="epochBar" style="width: 0%"></div>
            </div>
          </div>

          <div style="margin-bottom: 16px">
            <div class="col-header">
              <span class="sub">Accuracy</span>
              <span class="sub green" id="accPct">0%</span>
            </div>
            <div class="prog-track">
              <div
                class="prog-fill"
                id="accBar"
                style="width: 0%; background: var(--nn-green)"
              ></div>
            </div>
          </div>

          <div>
            <div class="col-header">
              <span class="sub">Loss (inverted)</span>
              <span class="sub red" id="lossPct">100%</span>
            </div>
            <div class="prog-track">
              <div
                class="prog-fill"
                id="lossBar"
                style="width: 100%; background: var(--nn-red)"
              ></div>
            </div>
          </div>

          <div
            style="
              margin-top: 18px;
              padding-top: 14px;
              border-top: 0.5px solid var(--nn-border);
            "
          >
            <div class="sub" style="margin-bottom: 6px">Architecture</div>
            <div
              style="
                display: flex;
                gap: 6px;
                align-items: center;
                font-size: 12px;
                color: var(--color-text-primary);
              "
            >
              <span
                style="
                  background: var(--color-background-secondary);
                  padding: 2px 8px;
                  border-radius: 4px;
                  border: 0.5px solid var(--nn-border);
                "
                >Input ×3</span
              >
              <span style="color: var(--nn-muted)">→</span>
              <span
                style="
                  background: var(--color-background-secondary);
                  padding: 2px 8px;
                  border-radius: 4px;
                  border: 0.5px solid var(--nn-border);
                "
                >Hidden ×3</span
              >
              <span style="color: var(--nn-muted)">→</span>
              <span
                style="
                  background: var(--color-background-secondary);
                  padding: 2px 8px;
                  border-radius: 4px;
                  border: 0.5px solid var(--nn-border);
                "
                >Output ×3</span
              >
            </div>
          </div>
        </div>
      </div>

      <!-- Chart -->
      <div class="card nn-full">
        <div class="col-header">
          <div class="section-title">Accuracy & loss over epochs</div>
          <div
            style="
              display: flex;
              gap: 14px;
              font-size: 11px;
              color: var(--nn-muted);
            "
          >
            <span
              ><span
                style="
                  display: inline-block;
                  width: 10px;
                  height: 2px;
                  background: var(--nn-green);
                  vertical-align: middle;
                  margin-right: 4px;
                "
              ></span
              >Accuracy</span
            >
            <span
              ><span
                style="
                  display: inline-block;
                  width: 10px;
                  height: 2px;
                  background: var(--nn-red);
                  vertical-align: middle;
                  margin-right: 4px;
                "
              ></span
              >Loss</span
            >
          </div>
        </div>
        <canvas id="chartCanvas" height="110"></canvas>
      </div>
    </div>

    <script src="../dist/shared.js"></script>
    <script src="nn.js"></script>
  </body>
</html>
