<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tree View Component</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="tree-container">
    <h2>Project Directory</h2>
    <ul id="tree" class="tree-view">
      <li>
        <span class="folder expanded">📁 src</span>
        <ul>
          <li>
            <span class="folder expanded">📁 components</span>
            <ul>
              <li><span class="file">📄 Button.js</span></li>
              <li><span class="file">📄 TreeView.js</span></li>
              <li><span class="file">📄 Modal.js</span></li>
            </ul>
          </li>
          <li>
            <span class="folder">📁 assets</span>
            <ul class="hidden">
              <li><span class="file">🖼️ logo.png</span></li>
              <li><span class="file">🖼️ bg-pattern.svg</span></li>
            </ul>
          </li>
          <li><span class="file">📄 index.js</span></li>
          <li><span class="file">📄 App.css</span></li>
        </ul>
      </li>
      <li>
        <span class="folder">📁 public</span>
        <ul class="hidden">
          <li><span class="file">📄 index.html</span></li>
          <li><span class="file">📄 favicon.ico</span></li>
        </ul>
      </li>
      <li><span class="file">📄 package.json</span></li>
      <li><span class="file">📄 README.md</span></li>
    </ul>
  </div>

  <script src="script.js"></script>
</body>
</html>
