  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    :root{
      --bg:#f4f7fb;
      --card:#ffffff;
      --text:#111827;
      --muted:#6b7280;
      --border:#e5e7eb;
      --primary:#6c5ce7;
      --orange:#eb6835;
      --shadow:0 10px 30px rgba(0,0,0,.08);
      --radius:22px;
    }

    body.dark-mode{
      --bg:#0f172a;
      --card:#111827;
      --text:#f8fafc;
      --muted:#cbd5e1;
      --border:#1e293b;
      --shadow:0 10px 30px rgba(0,0,0,.35);
    }

    body{
      font-family:"DM Sans",sans-serif;
      background:var(--bg);
      color:var(--text);
      transition:.3s;
    }

    a{
      text-decoration:none;
      color:inherit;
    }

    /* NAVBAR */

    .navbar{
      position:sticky;
      top:0;
      z-index:1000;
      height:80px;
      background:rgba(255,255,255,.85);
      backdrop-filter:blur(14px);
      border-bottom:1px solid var(--border);
      display:flex;
      align-items:center;
      justify-content:space-between;
      padding:0 28px;
    }

    body.dark-mode .navbar{
      background:rgba(15,23,42,.88);
    }

    .logo{
      font-family:"Syne",sans-serif;
      font-size:1.7rem;
      font-weight:800;
    }

    .nav-right{
      display:flex;
      align-items:center;
      gap:12px;
    }

    .theme-toggle{
      width:46px;
      height:46px;
      border:none;
      border-radius:14px;
      background:var(--card);
      color:var(--text);
      cursor:pointer;
      box-shadow:var(--shadow);
      font-size:1rem;
    }

    /* HERO */

    .page-hero{
      max-width:1300px;
      margin:40px auto 30px;
      padding:48px 56px;
      background:var(--card);
      border:1px solid var(--border);
      border-radius:var(--radius);
      display:flex;
      justify-content:space-between;
      gap:40px;
      align-items:center;
      flex-wrap:wrap;
      box-shadow:var(--shadow);
      position:relative;
      overflow:hidden;
    }

    .hero-left{
      flex:1;
      min-width:300px;
    }

    .page-title{
      font-size:3rem;
      line-height:1.1;
      font-family:"Syne",sans-serif;
      margin-bottom:18px;
    }

    .page-desc{
      max-width:700px;
      color:var(--muted);
      line-height:1.7;
      margin-bottom:24px;
    }

    .page-meta{
      display:flex;
      flex-wrap:wrap;
      gap:12px;
    }

    .meta-badge{
      padding:10px 16px;
      border-radius:999px;
      background:var(--bg);
      border:1px solid var(--border);
      font-size:.92rem;
      box-shadow:var(--shadow);
    }

    .toggle-hero-preview{
      background:var(--bg);
      border:1px solid var(--border);
      border-radius:var(--radius);
      padding:24px;
      min-width:260px;
      box-shadow:var(--shadow);
    }

    .thp-row{
      display:flex;
      align-items:center;
      justify-content:space-between;
      margin-bottom:18px;
      gap:20px;
    }

    .thp-row:last-child{
      margin-bottom:0;
    }

    /* FILTER */

    .filter-bar{
      max-width:1300px;
      margin:auto;
      padding:0 24px 10px;
      display:flex;
      gap:12px;
      flex-wrap:wrap;
      align-items:center;
    }

    .filter-btn{
      border:none;
      padding:12px 18px;
      border-radius:14px;
      background:var(--card);
      color:var(--text);
      cursor:pointer;
      border:1px solid var(--border);
      font-weight:600;
      transition:.25s;
    }

    .filter-btn.active,
    .filter-btn:hover{
      background:var(--primary);
      color:#fff;
    }

    /* GRID */

    .toggles-grid{
      max-width:1300px;
      margin:auto;
      padding:20px 24px 70px;
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(340px,1fr));
      gap:28px;
    }

    .component-card{
      background:var(--card);
      border:1px solid var(--border);
      border-radius:var(--radius);
      padding:24px;
      box-shadow:var(--shadow);
      transition:.3s;
    }

    .component-card:hover{
      transform:translateY(-6px);
    }

    .card-top{
      display:flex;
      justify-content:space-between;
      align-items:center;
      margin-bottom:20px;
    }

    .card-label{
      font-weight:700;
      font-size:1.1rem;
    }

    .card-tag{
      padding:6px 12px;
      border-radius:999px;
      font-size:.78rem;
      font-weight:700;
      color:#fff;
    }

    .tag-popular{
      background:#6c5ce7;
    }

    .tag-trending{
      background:#eb6835;
    }

    .tag-essential{
      background:#00b894;
    }

    .card-preview{
      background:#f8fafc;
      border-radius:18px;
      padding:26px;
      margin-bottom:18px;
    }

    body.dark-mode .card-preview{
      background:#0b1220;
    }

    .dark-preview{
      background:#0b1120 !important;
    }

    .toggle-demo-rows{
      display:flex;
      flex-direction:column;
      gap:18px;
    }

    .toggle-demo-row{
      display:flex;
      align-items:center;
      gap:14px;
    }

    .toggle-label-text{
      font-size:.95rem;
      color:var(--muted);
    }

    .card-desc{
      color:var(--muted);
      line-height:1.7;
      margin-bottom:20px;
    }

    .actions{
      display:flex;
      gap:12px;
      margin-bottom:16px;
      flex-wrap:wrap;
    }

    .action-btn{
      border:none;
      padding:12px 18px;
      border-radius:14px;
      cursor:pointer;
      font-weight:700;
      transition:.25s;
    }

    .view-btn{
      background:#111827;
      color:#fff;
    }

    .copy-btn{
      background:var(--orange);
      color:#fff;
    }

    .action-btn:hover{
      transform:translateY(-2px);
    }

    /* CODE BLOCK */

    .code-block{
      display:none;
      background:#020617;
      color:#f8fafc;
      padding:18px;
      border-radius:18px;
      overflow:auto;
      font-size:.88rem;
      line-height:1.7;
    }

    .code-block.open{
      display:block;
    }

    /* TOGGLES */

    .toggle-wrap input{
      display:none;
    }

    .toggle-wrap label{
      cursor:pointer;
      position:relative;
      display:block;
    }

    /* CLASSIC */

    .toggle-classic label{
      width:56px;
      height:30px;
      border-radius:999px;
      background:#dfe6e9;
      transition:.3s;
    }

    .toggle-classic label::after{
      content:"";
      position:absolute;
      width:24px;
      height:24px;
      top:3px;
      left:3px;
      border-radius:50%;
      background:#fff;
      transition:.35s cubic-bezier(.68,-0.55,.27,1.55);
      box-shadow:0 2px 8px rgba(0,0,0,.2);
    }

    .toggle-classic input:checked + label{
      background:#6c5ce7;
    }

    .toggle-classic input:checked + label::after{
      transform:translateX(26px);
    }

    /* IOS */

    .toggle-ios label{
      width:58px;
      height:32px;
      border-radius:999px;
      background:#e5e7eb;
      transition:.3s;
    }

    .toggle-ios label::after{
      content:"";
      position:absolute;
      width:28px;
      height:28px;
      top:2px;
      left:2px;
      border-radius:50%;
      background:#fff;
      transition:.3s cubic-bezier(.23,1,.32,1);
      box-shadow:0 2px 8px rgba(0,0,0,.18);
    }

    .toggle-ios input:checked + label{
      background:#34c759;
    }

    .toggle-ios input:checked + label::after{
      transform:translateX(26px);
    }

    /* NEON */

    .toggle-neon label{
      width:58px;
      height:32px;
      border-radius:999px;
      border:2px solid #4b5563;
      background:#111827;
      transition:.3s;
    }

  <!-- =========================================================
     COMPREHENSIVE RUNTIME LOGIC INTERACTION SCRIPTS
  ========================================================= -->
  <script>
    // System surface light mode monitoring traces on mount
    document.addEventListener("DOMContentLoaded", () => {
      const activeSkinStateTrace = localStorage.getItem("platform-toggles-skin-state") || "dark-matrix-mode";
      document.body.className = activeSkinStateTrace;
      
      const themeIconNodeBtn = document.querySelector("#themeToggle i");
      if (themeIconNodeBtn) {
        themeIconNodeBtn.className = activeSkinStateTrace === "dark-matrix-mode" ? "fa-solid fa-moon" : "fa-solid fa-sun";
      }
    });

    // Theme switching runtime control sequence
    document.getElementById("themeToggle").addEventListener("click", () => {
      const themeIconNodeBtn = document.querySelector("#themeToggle i");
      if (document.body.classList.contains("light-matrix-mode")) {
        document.body.classList.replace("light-matrix-mode", "dark-matrix-mode");
        localStorage.setItem("platform-toggles-skin-state", "dark-matrix-mode");
        themeIconNodeBtn.className = "fa-solid fa-moon";
      } else {
        document.body.classList.replace("dark-matrix-mode", "light-matrix-mode");
        localStorage.setItem("platform-toggles-skin-state", "light-matrix-mode");
        themeIconNodeBtn.className = "fa-solid fa-sun";
      }
    });

    // Code Display Drawer Drawer Visibility Controls
    function toggleCodeDrawer(targetDrawerDOMId, executionTriggerButtonNode) {
      const drawerTargetNode = document.getElementById(targetDrawerDOMId);
      if (!drawerTargetNode) return;

      const drawerCurrentlyExpanded = drawerTargetNode.classList.toggle('open');
      executionTriggerButtonNode.innerHTML = drawerCurrentlyExpanded
        ? '<i class="fa-solid fa-eye-slash"></i> Collapse Drawer'
        : '<i class="fa-solid fa-code"></i> Inspect Sheet';
    }

    // Clipboard data payload parsing infrastructure
    function copyBlueprintCode(targetDrawerDOMId, executionTriggerButtonNode) {
      const innerTextPayloadSource = document.getElementById(targetDrawerDOMId).innerText;
      navigator.clipboard.writeText(innerTextPayloadSource).then(() => {
        const toastNotificationOverlayNode = document.getElementById('copyToast');
        toastNotificationOverlayNode.classList.add('show');
        
        const originalButtonLabelCache = executionTriggerButtonNode.innerHTML;
        executionTriggerButtonNode.innerHTML = '<i class="fa-solid fa-circle-check"></i> Token Harvested!';
        executionTriggerButtonNode.disabled = true;

        setTimeout(() => {
          toastNotificationOverlayNode.classList.remove('show');
          executionTriggerButtonNode.innerHTML = originalButtonLabelCache;
          executionTriggerButtonNode.disabled = false;
        }, 1800);
      });
    }

    // Category sorting filter evaluation framework
    function runtimeFilterBlocks(selectedCategoryTokenKey, triggerButtonNode) {
      document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
      triggerButtonNode.classList.add('active');

      document.querySelectorAll('.component-card').forEach(card => {
        const structuralCardCategoryReference = card.getAttribute('data-category');
        if (selectedCategoryTokenKey === 'all' || structuralCardCategoryReference === selectedCategoryTokenKey) {
          card.style.display = '';
        } else {
          card.style.display = 'none';
        }
      });
    }

    // Live Localized Input String Mirror Search Filter Logic
    document.getElementById('toggleSearchInput').addEventListener('input', (e) => {
      const formattedInputQueryString = e.target.value.toLowerCase().trim();
      document.querySelectorAll('.component-card').forEach(card => {
        const titleTextContentString = card.querySelector('.card-label').innerText.toLowerCase();
        const bodyDescTextContentString = card.querySelector('.card-desc').innerText.toLowerCase();
        if (titleTextContentString.includes(formattedInputQueryString) || bodyDescTextContentString.includes(formattedInputQueryString)) {
          card.style.display = '';
        } else {
          card.style.display = 'none';
        }
      });
    });

    // Scroll metrics activation tracking tracking channels
    const globalScrollTopBtnNode = document.getElementById("scrollTop");
    window.addEventListener("scroll", () => {
      if (window.scrollY > 400) {
        globalScrollTopBtnNode.classList.add("show");
      } else {
        globalScrollTopBtnNode.classList.remove("show");
      }
    });

    globalScrollTopBtnNode.addEventListener("click", () => {
      window.scrollTo({ top: 0, behavior: "smooth" });
    });

    function runtimeToggleSidebar() {
      const sidebarNodeElement = document.querySelector('.sidebar');
      const backgroundBackdropShield = document.getElementById('sidebarBackdrop');
      if (sidebarNodeElement && backgroundBackdropShield) {
        sidebarNodeElement.classList.toggle('visible');
        backgroundBackdropShield.classList.toggle('visible');
      }
    }
    window.runtimeToggleSidebar = runtimeToggleSidebar;
  </script>
</body>
</html>
