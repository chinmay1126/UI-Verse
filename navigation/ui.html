<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="stylesheet" href="../dist/shared.css">
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self' https:; base-uri 'self'; frame-ancestors 'none'; object-src 'none'; connect-src 'self' https:; img-src 'self' data: https:; font-src 'self' data: https:; script-src 'self' https: 'unsafe-hashes'; script-src-attr 'unsafe-hashes'; style-src 'self' https: 'unsafe-hashes'; style-src-attr 'unsafe-hashes'">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Enhanced Bottom Nav</title>
  <link rel="stylesheet" href="ui.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.31.0/dist/tabler-icons.min.css">
</head>
<body>
  <div class="phone">
    <div class="phone-content">
      <div class="page-label" id="page-title">Home</div>
    </div>
    <nav class="bottom-nav-demo" id="demoNav">
      <div class="pill" id="pill"></div>
      <div class="nav-btn active" data-label="Home">
        <i class="ti ti-home" aria-hidden="true"></i>
        <span>Home</span>
      </div>
      <div class="nav-btn" data-label="Search">
        <i class="ti ti-search" aria-hidden="true"></i>
        <span>Search</span>
      </div>
      <div class="nav-btn" data-label="Saved">
        <i class="ti ti-heart" aria-hidden="true"></i>
        <span>Saved</span>
      </div>
      <div class="nav-btn" data-label="Profile">
        <i class="ti ti-user" aria-hidden="true"></i>
        <span>Profile</span>
      </div>
    </nav>
  </div>
  <script src="ui.js"></script>
  <script src="../dist/shared.js"></script>
</body>
</html>
