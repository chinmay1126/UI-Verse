<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Advanced Gallery UI</title>

<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700&family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

<link rel="stylesheet" href="gallery.css"/>
</head>

<body>

<main class="gallery-page">

  <!-- HERO -->
  <section class="gallery-hero">
    <div class="hero-badge">Modern Gallery UI</div>
    <h1>Explore <span>Creative Images</span></h1>
    <p>Search and browse premium visuals in a clean modern layout.</p>
  </section>

  <!-- SEARCH BAR -->
  <section class="search-bar">

    <div class="search-box">
      <i class="fa fa-search"></i>
      <input type="text" placeholder="Search images, nature, tech, travel..." />
    </div>

    <button class="search-btn">
      Search
    </button>

  </section>

  <!-- FILTERS -->
  <section class="filters">
    <button class="active">All</button>
    <button>Nature</button>
    <button>Workspace</button>
    <button>Tech</button>
    <button>Travel</button>
  </section>

  <!-- GRID -->
  <section class="gallery-grid">

    <!-- MANY IMAGES -->
    <div class="card"><img src="https://images.unsplash.com/photo-1506744038136-46273834b3fb"></div>
    <div class="card"><img src="https://images.unsplash.com/photo-1494526585095-c41746248156"></div>
    <div class="card"><img src="https://images.unsplash.com/photo-1519389950473-47ba0277781c"></div>
    <div class="card"><img src="https://images.unsplash.com/photo-1516321318423-f06f85e504b3"></div>
    <div class="card"><img src="https://images.unsplash.com/photo-1500534623283-312aade485b7"></div>
    <div class="card"><img src="https://images.unsplash.com/photo-1507525428034-b723cf961d3e"></div>
    <div class="card"><img src="https://images.unsplash.com/photo-1484417894907-623942c8ee29"></div>
    <div class="card"><img src="https://images.unsplash.com/photo-1498050108023-c5249f4df085"></div>
    <div class="card"><img src="https://images.unsplash.com/photo-1522199710521-72d69614c702"></div>
    <div class="card"><img src="https://images.unsplash.com/photo-1515879218367-8466d910aaa4"></div>
    <div class="card"><img src="https://images.unsplash.com/photo-1500530855697-b586d89ba3ee"></div>
    <div class="card"><img src="https://images.unsplash.com/photo-1526772662000-3f88f10405ff"></div>

  </section>

</main>

</body>
</html>
