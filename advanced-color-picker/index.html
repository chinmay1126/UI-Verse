<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self' https:; base-uri 'self'; frame-ancestors 'none'; object-src 'none'; connect-src 'self' https:; img-src 'self' data: https:; font-src 'self' data: https:; script-src 'self' https: 'unsafe-hashes'; script-src-attr 'unsafe-hashes'; style-src 'self' https: 'unsafe-hashes'; style-src-attr 'unsafe-hashes'">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Advanced Color Picker Component</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="color-picker-wrapper">
    <h2>Advanced Color Picker</h2>
    
    <div class="color-picker-container">
      <div class="color-preview" id="color-preview"></div>
      
      <div class="color-controls">
        <label for="color-input">Select Color</label>
        <input type="color" id="color-input" value="#4f46e5">
        
        <div class="color-values">
          <div class="input-group">
            <label for="hex-input">HEX</label>
            <input type="text" id="hex-input" value="#4f46e5" spellcheck="false">
            <button class="copy-btn" id="copy-hex" title="Copy HEX">📋</button>
          </div>
          
          <div class="input-group">
            <label for="rgb-input">RGB</label>
            <input type="text" id="rgb-input" value="rgb(79, 70, 229)" readonly>
            <button class="copy-btn" id="copy-rgb" title="Copy RGB">📋</button>
          </div>

          <div class="input-group">
            <label for="hsl-input">HSL</label>
            <input type="text" id="hsl-input" value="hsl(243, 75%, 59%)" readonly>
            <button class="copy-btn" id="copy-hsl" title="Copy HSL">📋</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
