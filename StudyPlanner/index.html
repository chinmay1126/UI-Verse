<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Study Planner</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>📚 Smart Study Planner</h1>

        <div class="task-input">
            <input type="text" id="taskInput" placeholder="Enter study task...">
            <button onclick="addTask()">Add Task</button>
        </div>

        <div class="planner">

            <div class="task-panel">
                <h2>Tasks</h2>
                <div id="taskList" class="task-list"></div>
            </div>

            <div class="schedule-panel">
                <h2>Today's Schedule</h2>

                <div class="slot" data-time="8 AM">
                    <h3>8:00 AM</h3>
                </div>

                <div class="slot" data-time="10 AM">
                    <h3>10:00 AM</h3>
                </div>

                <div class="slot" data-time="12 PM">
                    <h3>12:00 PM</h3>
                </div>

                <div class="slot" data-time="2 PM">
                    <h3>2:00 PM</h3>
                </div>

                <div class="slot" data-time="4 PM">
                    <h3>4:00 PM</h3>
                </div>

                <div class="slot" data-time="6 PM">
                    <h3>6:00 PM</h3>
                </div>

            </div>

        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
