<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="stylesheet" href="../dist/shared.css">
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self' https:; base-uri 'self'; frame-ancestors 'none'; object-src 'none'; connect-src 'self' https:; img-src 'self' data: https:; font-src 'self' data: https:; script-src 'self' https: 'unsafe-hashes'; script-src-attr 'unsafe-hashes'; style-src 'self' https: 'unsafe-hashes'; style-src-attr 'unsafe-hashes'">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Voice Command Dashboard</title>
  </head>
<body>
  <a class="skip-link" href="#main-content">Skip to main content</a>

  <main id="main-content">
    <div class="dashboard">

      <div class="voice-card">

        <div class="header">
          <div class="icon">🎙️</div>

          <h1>Voice Assistant</h1>

          <p>
            Speak naturally to control your virtual classroom.
          </p>
        </div>

        <button
          class="mic-btn"
          id="micBtn"
          aria-label="Start voice recognition"
        >
          🎤
        </button>

        <div class="status listening" id="status">
          ● Ready to Listen
        </div>

        <div class="voice-bars">

          <span></span>
          <span></span>
          <span></span>
          <span></span>
          <span></span>
          <span></span>
          <span></span>

        </div>

        <div class="recognized-box">

          <label>Recognized Speech</label>

          <div id="recognizedText">
            Waiting for input...
          </div>

        </div>

        <div class="commands">

          <h3>Quick Commands</h3>

          <ul>
            <li>🎥 Open Camera</li>
            <li>🎙️ Mute Microphone</li>
            <li>📺 Start Presentation</li>
            <li>👥 Join Meeting</li>
            <li>🚪 Leave Classroom</li>
          </ul>

        </div>

      </div>

    </div>
  </main>

  <script src="../dist/shared.js"></script>
</body>

</html>
