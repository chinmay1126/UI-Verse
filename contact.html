    <meta charset="UTF-8">

    <title>Contact Us</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body>


  <aside class="sidebar">
    <h2>UIverse</h2>
    <ul>
      <li><a href="index.html"><i class="fa-solid fa-house"></i><p>Home</p></a></li>
      <li><a href="button.html"><i class="fa-solid fa-mobile-button"></i><p>Butttons</p></a></li>

    </ul>
  </aside> 

    <section id="contact" class="contact-center">
  <div class="contact-box">
    
    <h2>Get in Touch</h2>
    <p class="subtitle">We’d love to hear from you. Fill out the form below.</p>

    <form id="contactForm">

      <div class="input-group">
        <input type="text" id="name" required>
        <label for="name">Full Name</label>
      </div>

      <div class="input-group">
        <input type="email" id="email" required>
        <label for="email">Email Address</label>
      </div>

      <div class="input-group">
        <textarea id="message" rows="5" required></textarea>
        <label for="message">Your Message</label>
      </div>

      <button type="submit">Send Message</button>

      <p id="formStatus" class="status"></p>

    </form>

  </div>
</section>

<script>
  const form = document.getElementById("contactForm");
  const status = document.getElementById("formStatus");

  form.addEventListener("submit", function (e) {
    e.preventDefault();

    status.textContent = "Sending...";
    status.style.color = "#555";

    setTimeout(() => {
      status.textContent = "✅ Message sent successfully!";
      status.style.color = "green";
      form.reset();
    }, 1500);
  });
</script>

</body>
</html>
