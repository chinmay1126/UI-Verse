name: Component Metadata Version Validator

on:
  pull_request:
    paths:
      - 'scripts/component-metadata.js'
      - '**/*.html'

jobs:
  metadata-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Validate Component Metadata
        run: npm run components:version:check
