name: Storybook Smoke Test

on:
  pull_request:
    paths:
      - '.storybook/**'
      - 'stories/**'
      - 'package.json'

jobs:
  storybook-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Storybook
        run: npm run build-storybook
