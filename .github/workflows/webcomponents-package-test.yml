name: Web Components & Packaging Validator

on:
  pull_request:
    paths:
      - 'src/**'
      - 'tests/webcomponents/**'
      - 'package.json'
      - 'rollup.config.js'

jobs:
  validate-package:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Web Components
        run: npm run build

      - name: Run Web Component Packaging Checks
        run: npm run package:check
