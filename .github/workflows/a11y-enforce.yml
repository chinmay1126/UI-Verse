name: Accessibility CI Enforcement

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main, develop ]

jobs:
  accessibility-check:
    name: Accessibility Tests (axe-core)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps
        timeout-minutes: 15

      - name: Run axe accessibility audit
        id: axe
        run: npm run audit:a11y
        continue-on-error: true

      - name: Run Playwright accessibility tests
        id: playwright
        run: npm run test:e2e:accessibility
        continue-on-error: true

      - name: Run shared accessibility checklist
        id: checklist
        run: |
          npm run a11y:checklist
        continue-on-error: true

      - name: Generate detailed accessibility report
        if: always()
        run: |
          echo "## 📋 Accessibility Audit Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Test Status" >> $GITHUB_STEP_SUMMARY
          echo "- Axe Audit: ${{ steps.axe.outcome }}" >> $GITHUB_STEP_SUMMARY
          echo "- Playwright Tests: ${{ steps.playwright.outcome }}" >> $GITHUB_STEP_SUMMARY
          echo "- Checklist Validation: ${{ steps.checklist.outcome }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [ -f reports/a11y/checklist-summary.md ]; then
            echo "### Checklist Summary" >> $GITHUB_STEP_SUMMARY
            cat reports/a11y/checklist-summary.md >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
          fi
          
          if [ -f reports/a11y/axe-results.json ]; then
            VIOLATIONS=$(grep -c '"violations"' reports/a11y/axe-results.json || echo "0")
            echo "### Issues Found" >> $GITHUB_STEP_SUMMARY
            echo "- Critical: $(grep -c '"impact":"critical"' reports/a11y/axe-results.json || echo "0")" >> $GITHUB_STEP_SUMMARY
            echo "- Serious: $(grep -c '"impact":"serious"' reports/a11y/axe-results.json || echo "0")" >> $GITHUB_STEP_SUMMARY
            echo "- Minor: $(grep -c '"impact":"minor"' reports/a11y/axe-results.json || echo "0")" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Generate remediation guide
        if: |
          steps.axe.outcome == 'failure' || 
          steps.playwright.outcome == 'failure' ||
          steps.checklist.outcome == 'failure'
        run: |
          echo "## 🔧 How to Fix Accessibility Issues" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Run These Commands Locally:" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`bash" >> $GITHUB_STEP_SUMMARY
          echo "# Audit all accessibility issues" >> $GITHUB_STEP_SUMMARY
          echo "npm run a11y:audit" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "# Auto-fix simple issues" >> $GITHUB_STEP_SUMMARY
          echo "npm run a11y:remediate:apply" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "# Generate detailed report" >> $GITHUB_STEP_SUMMARY
          echo "npm run a11y:report" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "📖 [Read the Accessibility Guide](../../Docs/ACCESSIBILITY_AUDIT_REMEDIATION.md)" >> $GITHUB_STEP_SUMMARY

      - name: Upload accessibility reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: accessibility-reports
          path: reports/a11y/
          retention-days: 30

  accessibility-gate:
    name: Accessibility Quality Gate
    runs-on: ubuntu-latest
    needs: accessibility-check
    if: always()
    steps:
      - name: Determine gate status
        id: gate
        run: |
          if [ "${{ needs.accessibility-check.result }}" != "success" ]; then
            echo "status=warning" >> $GITHUB_OUTPUT
            echo "## ⚠️ Accessibility Check Warning" >> $GITHUB_STEP_SUMMARY
            echo "Some accessibility tests did not pass. Please review the report above." >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**This is currently a warning, but will become blocking in future releases.**" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "Run locally to diagnose:" >> $GITHUB_STEP_SUMMARY
            echo "\`npm run a11y:audit\`" >> $GITHUB_STEP_SUMMARY
          else
            echo "status=success" >> $GITHUB_OUTPUT
            echo "✅ All accessibility checks passed!" >> $GITHUB_STEP_SUMMARY
          fi