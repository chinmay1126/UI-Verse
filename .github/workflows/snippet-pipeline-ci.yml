name: Snippet Pipeline Validator

on:
  pull_request:
    paths:
      - 'scripts/snippet-exporter.js'
      - 'scripts/snippet-validate.js'
      - '**/*.html'

jobs:
  snippet-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Validate Snippets
        run: npm run snippets:check
