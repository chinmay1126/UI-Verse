name: Dependency Update Auto Labeler

on:
  pull_request_target:
    types: [opened]

jobs:
  label:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Auto Label PR
        uses: actions/github-script@v6
        with:
          script: |
            const pr = context.payload.pull_request;
            const isDependabot = pr.user.login === 'dependabot[bot]';
            const hasDependencyChanges = pr.title.toLowerCase().includes('bump') || pr.title.toLowerCase().includes('dependencies');
            
            if (isDependabot || hasDependencyChanges) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr.number,
                labels: ['dependencies']
              });
            }
