name: Lighthouse CI Web Vitals Regression Gate

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]

concurrency:
  group: lighthouse-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lighthouse:
    name: Lighthouse CI Audit
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Install Lighthouse CI
        run: npm install -g @lhci/cli@0.14.x
      
      - name: Download baseline reports
        id: download-baseline
        run: |
          if [ -f ".lighthouseci/baseline.json" ]; then
            echo "Baseline found, downloading..."
            mkdir -p .lighthouseci
            # In real usage, this would download from a secure storage
            # For now, we'll create a placeholder
            echo '{}' > .lighthouseci/baseline.json
          else
            echo "No baseline found, this is a fresh run"
            mkdir -p .lighthouseci
            echo '{}' > .lighthouseci/baseline.json
          fi
      
      - name: Run Lighthouse CI
        run: lhci autorun --config=.lighthouserc.json
        continue-on-error: true
      
      - name: Generate comparison report
        if: always()
        run: |
          node scripts/lighthouse-report-generator.js \
            --current .lighthouseci \
            --baseline .lighthouseci/baseline.json \
            --output .lighthouseci/comparison.md
      
      - name: Comment on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            
            const commentPath = '.lighthouseci/comparison.md';
            if (fs.existsSync(commentPath)) {
              const comment = fs.readFileSync(commentPath, 'utf8');
              
              // Find existing comment
              const issueNumber = context.payload.pull_request.number;
              const comments = await github.rest.issues.listComments({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumber
              });
              
              const existingComment = comments.data.find(
                c => c.user.login === 'github-actions[bot]' && 
                     c.body.includes('Lighthouse CI Performance Report')
              );
              
              if (existingComment) {
                await github.rest.issues.updateComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  comment_id: existingComment.id,
                  body: comment
                });
              } else {
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issueNumber,
                  body: comment
                });
              }
            }
      
      - name: Upload Lighthouse reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: lighthouse-reports-${{ github.run_number }}
          path: .lighthouseci/*.html
          retention-days: 30
      
      - name: Check for regressions
        run: |
          if [ -f ".lighthouseci/regression.txt" ]; then
            echo "⚠️ Performance regressions detected!"
            cat .lighthouseci/regression.txt
            # Exit with error if there are regressions
            exit 1
          fi