name: Design System Validator

on:
  pull_request:
    branches: [main, master]

jobs:
  changed-files:
    runs-on: ubuntu-latest
    outputs:
      components: ${{ steps.changes.outputs.components }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - id: changes
        run: |
          CHANGED=$(git diff --name-only origin/${{ github.base_ref }}...HEAD | grep -E '\.(html|css)$' || true)
          echo "components=$CHANGED" >> $GITHUB_OUTPUT

  tokens:
    name: Token Compliance
    runs-on: ubuntu-latest
    needs: changed-files
    if: ${{ needs.changed-files.outputs.components != '' }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: npm
      - run: npm ci
      - run: npm run test:tokens
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: token-compliance-report
          path: reports/tokens/

  a11y:
    name: Accessibility Audit
    runs-on: ubuntu-latest
    needs: changed-files
    if: ${{ needs.changed-files.outputs.components != '' }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run test:a11y:components
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: a11y-component-report
          path: reports/a11y/

  visual:
    name: Visual Regression
    runs-on: ubuntu-latest
    needs: changed-files
    if: ${{ needs.changed-files.outputs.components != '' }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run test:visual:components
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: visual-regression-report
          path: test-results/

  perf:
    name: Performance Budget
    runs-on: ubuntu-latest
    needs: changed-files
    if: ${{ needs.changed-files.outputs.components != '' }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: npm
      - run: npm ci
      - run: npm run test:perf:components
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: perf-component-report
          path: reports/perf/

  pr-comment:
    name: PR Comment
    runs-on: ubuntu-latest
    needs: [tokens, a11y, visual, perf]
    if: always()
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: npm
      - run: npm ci
      - uses: actions/download-artifact@v4
        with:
          path: artifacts/
          merge-multiple: false
      - run: node scripts/pr-comment-bot.js
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}