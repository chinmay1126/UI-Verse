name: HTML Validation

on:
  pull_request:
    paths:
      - '**/*.html'
      - 'package.json'

jobs:
  html-validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Validate HTML
        run: npm run lint:html
