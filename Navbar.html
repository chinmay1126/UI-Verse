<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Navbar Components — UIverse</title>

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

  <!-- Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

  <!-- ONLY ONE CSS -->
  <link rel="stylesheet" href="navbar.css">
</head>

<body>

<!-- ===== SIDEBAR ===== -->
<aside class="sidebar">
  <div class="brand">⬡ UIverse</div>

  <ul class="menu">
    <li><i class="fa-solid fa-house"></i> Home</li>
    <li><i class="fa-solid fa-hand-pointer"></i> Buttons</li>
    <li class="active"><i class="fa-solid fa-bars"></i> Navbar</li>
    <li><i class="fa-solid fa-table-cells"></i> Cards</li>
    <li><i class="fa-solid fa-keyboard"></i> Inputs</li>
  </ul>
</aside>

<!-- ===== MAIN ===== -->
<div class="main">

  <!-- TOP NAVBAR -->
  <header class="topbar">
    <div class="logo">UIverse</div>

    <div class="search">
      <i class="fa-solid fa-magnifying-glass"></i>
      <input type="text" placeholder="Search components..." />
    </div>

    <div class="actions">
      <button class="btn outline">+ Add</button>
      <button class="btn primary">Save</button>
      <button class="icon"><i class="fa-solid fa-moon"></i></button>
    </div>
  </header>

  <!-- HERO -->
  <section class="hero">
    <h1>Navbar Components</h1>
    <p>Modern navigation bars built with clean UI design.</p>
  </section>

  <!-- COMPONENTS -->
  <section class="grid">

    <!-- SIMPLE -->
    <div class="card">
      <h3>Simple Navbar</h3>
      <div class="preview">
        <nav class="demo-nav">
          <span>UIverse</span>
          <div>
            <a href="#">Home</a>
            <a href="#">About</a>
          </div>
        </nav>
      </div>
    </div>

    <!-- CENTER -->
    <div class="card">
      <h3>Centered Navbar</h3>
      <div class="preview">
        <nav class="demo-nav center">
          <a href="#">Home</a>
          <a href="#">Docs</a>
        </nav>
      </div>
    </div>

    <!-- BUTTON -->
    <div class="card">
      <h3>Button Navbar</h3>
      <div class="preview">
        <nav class="demo-nav">
          <span>UIverse</span>
          <button class="btn primary">Login</button>
        </nav>
      </div>
    </div>

  </section>

</div>

</body>
</html>
