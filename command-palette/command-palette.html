  <script>
    (function() {
      // Search input enter key redirect
      const navSearch = document.getElementById('searchInput');
      if (navSearch) {
        navSearch.addEventListener('keydown', function(e) {
          if (e.key === 'Enter' && this.value.trim()) {
            const q = encodeURIComponent(this.value.trim());
            window.location.href = '../components/Discovery/component-discovery.html?q=' + q;
          }
        });
      }
      
      // Fallback toggleDarkMode function if not defined globally by the page script
      const toggleBtn = document.getElementById('darkModeToggle');
      if (toggleBtn) {
        if (typeof window.toggleDarkMode !== 'function') {
          window.toggleDarkMode = function() {
            document.body.classList.toggle('dark-mode');
            const isDark = document.body.classList.contains('dark-mode');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
            const icon = toggleBtn.querySelector('i');
            if (icon) {
              icon.className = isDark ? 'fa-solid fa-sun' : 'fa-solid fa-moon';
            }
          };
        }
        
        // Match initial theme icon class
        const isDark = localStorage.getItem('theme') === 'dark' || document.body.classList.contains('dark-mode');
        const icon = toggleBtn.querySelector('i');
        if (icon && isDark) {
          icon.className = 'fa-solid fa-sun';
        }
      }
    })();
  </script>

  <script>

    /* ================= COMMAND SEARCH ================= */

    const commandInput =
    document.getElementById("commandInput");

    const commandItems =
    document.querySelectorAll(".command-item");

    commandInput.addEventListener("keyup", () => {

      let value =
      commandInput.value.toLowerCase();

      commandItems.forEach(item => {

        let text =
        item.innerText.toLowerCase();

        item.style.display =
        text.includes(value)
        ? "flex"
        : "none";

      });

    });

    /* ================= OPEN/CLOSE PALETTE ================= */

    const overlay =
    document.getElementById("paletteOverlay");

    const openBtn =
    document.getElementById("openPaletteBtn");

    openBtn.onclick = () => {

      overlay.classList.add("active");

      commandInput.focus();

    };

    document.addEventListener("keydown", (e) => {

      if (
        (e.metaKey || e.ctrlKey)
        && e.key.toLowerCase() === "k"
      ) {

        e.preventDefault();

        overlay.classList.toggle("active");

        commandInput.focus();

      }

      if (e.key === "Escape") {

        overlay.classList.remove("active");

      }

    });

    /* ================= CLOSE ON OUTSIDE CLICK ================= */

    overlay.addEventListener("click", (e) => {

      if (e.target === overlay) {

        overlay.classList.remove("active");

      }

    });

    /* ================= DEMO ALERT ================= */

    commandItems.forEach(item => {

      item.addEventListener("click", () => {

        alert(
          item.innerText.trim()
        );

      });
