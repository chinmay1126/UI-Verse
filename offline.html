<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Offline / 404 — UI-Verse</title>

  <style>
    :root{
      --bg1:#0f172a;
      --bg2:#1e293b;
      --card:#111827cc;
      --text:#e5e7eb;
      --muted:#94a3b8;
      --accent:#38bdf8;
      --danger:#fb7185;
    }

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial;
    }

    body{
      height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      background: radial-gradient(circle at top, var(--bg2), var(--bg1));
      color:var(--text);
      overflow:hidden;
    }

    .wrapper{
      text-align:center;
      padding:20px;
    }

    .card{
      width:min(520px,90vw);
      padding:40px 30px;
      border-radius:18px;
      background:var(--card);
      backdrop-filter: blur(12px);
      box-shadow:0 10px 40px rgba(0,0,0,0.4);
      border:1px solid rgba(255,255,255,0.08);
      animation: float 3s ease-in-out infinite;
    }

    @keyframes float{
      0%,100%{transform:translateY(0px);}
      50%{transform:translateY(-10px);}
    }

    .error-code{
      font-size:90px;
      font-weight:800;
      letter-spacing:4px;
      color:var(--danger);
      animation: pulse 1.8s infinite;
    }

    @keyframes pulse{
      0%,100%{opacity:1;}
      50%{opacity:0.5;}
    }

    h1{
      margin-top:10px;
      font-size:26px;
    }

    p{
      margin-top:10px;
      color:var(--muted);
      line-height:1.5;
    }

    .status{
      margin-top:15px;
      font-size:14px;
      padding:6px 12px;
      display:inline-block;
      border-radius:20px;
      background:rgba(248,113,113,0.1);
      color:var(--danger);
    }

    .online{
      background:rgba(34,197,94,0.15);
      color:#22c55e;
    }

    .btn{
      margin-top:20px;
      padding:10px 18px;
      border:none;
      border-radius:10px;
      cursor:pointer;
      background:var(--accent);
      color:#001018;
      font-weight:600;
      transition:0.3s;
    }

    .btn:hover{
      transform:scale(1.05);
      background:#0ea5e9;
    }

    .dots{
      margin-top:15px;
      font-size:14px;
      color:var(--muted);
    }
  </style>
</head>

<body>
  <div class="wrapper">
    <div class="card">
      
      <div class="error-code">404</div>

      <h1 id="title">You're Offline</h1>

      <p id="msg">
        It looks like your internet connection is lost or the page is unavailable.
      </p>

      <div id="status" class="status">Checking connection...</div>

      <br>

      <button class="btn" onclick="location.reload()">
        Retry Connection
      </button>

      <div class="dots">Tip: cached pages may still work offline</div>
    </div>
  </div>

  <script>
    function updateStatus(){
      const status = document.getElementById("status");
      const title = document.getElementById("title");
      const msg = document.getElementById("msg");

      if(navigator.onLine){
        status.textContent = "You are back online";
        status.classList.add("online");

        title.textContent = "All Good!";
        msg.textContent = "Connection restored. You can continue browsing.";
      } else {
        status.textContent = "No internet connection";
        status.classList.remove("online");

        title.textContent = "You're Offline";
        msg.textContent = "It looks like your internet connection is lost or the page is unavailable.";
      }
    }

    window.addEventListener("online", updateStatus);
    window.addEventListener("offline", updateStatus);
    updateStatus();
  </script>
</body>
</html>
